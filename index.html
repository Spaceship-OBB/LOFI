<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <title>Lofi Code Player</title>
    <style>
        :root {
            --bg-color: #1a1b26;
            --accent-color: #ff9e64; /* 暖橙色，更有Lofi感 */
            --text-color: #cfc9c2;
        }
        body {
            margin: 0;
            height: 100vh;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            background-color: var(--bg-color);
            color: var(--text-color);
            font-family: 'Courier New', Courier, monospace;
            overflow: hidden;
        }
        /* 简单的背景噪点装饰 */
        body::before {
            content: "";
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: url('https://www.transparenttextures.com/patterns/stardust.png');
            opacity: 0.1;
            pointer-events: none;
        }
        .player-card {
            background: rgba(255, 255, 255, 0.05);
            padding: 40px;
            border-radius: 4px;
            border: 1px solid rgba(255, 158, 100, 0.3);
            text-align: center;
            backdrop-filter: blur(5px);
        }
        .status { 
            margin-bottom: 30px; 
            font-size: 0.9rem; 
            letter-spacing: 3px;
            text-transform: uppercase;
        }
        .controls button {
            padding: 12px 24px;
            background: transparent;
            border: 1px solid var(--accent-color);
            color: var(--accent-color);
            cursor: pointer;
            font-family: inherit;
            font-size: 0.8rem;
            transition: all 0.4s;
            outline: none;
        }
