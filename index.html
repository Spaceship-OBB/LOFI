<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <title>Lofi Studio - Full Initial Session</title>
    <link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap" rel="stylesheet">
    <style>
        :root { --bg: #0d0e14; --accent: #ff9e64; --border: #38bdf8; --step-off: #1e1f29; }
        body { margin: 0; background: var(--bg); color: #fff; font-family: 'Press Start 2P', cursive; display: flex; flex-direction: column; align-items: center; padding-top: 130px; padding-bottom: 50px; font-size: 8px; }

        /* 像素扫描线背景 */
        body::after {
            content: ""; position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: linear-gradient(rgba(18, 16, 16, 0) 50%, rgba(0, 0, 0, 0.15) 50%), 
                        linear-gradient(90deg, rgba(255, 0, 0, 0.03), rgba(0, 255, 0, 0.01), rgba(0, 0, 255, 0.03));
            background-size: 100% 3px, 3px 100%; pointer-events: none; z-index: 999;
        }

        .floating-transport {
            position: fixed; top: 0; left: 0; width: 100%; height: 90px;
            background: rgba(22, 23, 32, 0.9); border-bottom: 4px solid var(--border);
            backdrop-filter: blur(8px); z-index: 1000;
            display: flex; align-items: center; justify-content: center; gap: 30px;
            box-shadow: 0 5px 25px rgba(0,0,0,0.6);
        }

        .ctrl-group { display: flex; flex-direction: column; gap: 8px; align-items: center; }
        button { padding: 12px 20px; font-family: inherit; cursor: pointer; border: none; background: var(--border); color: #000; box-shadow: 3px 3px 0 #000; transition: 0.1s; }
        button#play-btn.playing { background: var(--accent); }
        input[type=range] { cursor: pointer; accent-color: var(--accent); }

        .rack { width: 95%; max-width: 1100px; display: flex; flex-direction: column; gap: 8px; }
        .group-tag { color: var(--border); border-bottom: 2px solid #333; padding: 20px 0 5px 0; margin-bottom: 5px; text-align: left; width: 100%; }
        .track { display: flex; align-items: center; gap: 10px; background: rgba(255,255,255,0.03); padding: 8px 12px; border-radius: 2px; }
        .mixer { width: 90px; display: flex; flex-direction: column; gap: 4px; border-right: 1px solid #333; padding-right: 10px; }
        .track-name { font-size: 7px; color: var(--accent); text-transform: uppercase; }

        .steps { display: grid; grid-template-columns: repeat(16, 1fr); gap: 4px; flex-grow: 1; }
        .step { aspect-ratio: 1; background: var(--step-off); border: 1px solid #000; cursor: pointer; min-width: 20px; }
        .step.on { background: var(--accent); box-shadow: 0 0 10px var(--accent); }
        .step.beat { border-color: #555; }
        .step.current { border: 2px solid #fff; transform: scale(1.1); z-index: 10; }
    </style>
</head>
<body>

    <div class="floating-transport">
        <div class="ctrl-group"><button id="play-btn">INITIALIZE SYSTEM</button></div>
        <div class="ctrl-group"><button id="replay-btn">REPLAY</button></div>
	<div class="ctrl-group"><button id="clean-btn">CLEAN</button></div>
        <div class="ctrl-group"><label id="bpm-val">BPM: 85</label><input type="range" id="bpm-slider" min="40" max="180" value="85"></div>
        <div class="ctrl-group"><label>MASTER VOL</label><input type="range" id="master-vol" min="0" max="1" step="0.01" value="0.6"></div>
	<div class="ctrl-group"><button id="save-btn">SAVE MY BEAT</button></div>
	<div class="ctrl-group"><button id="load-btn">LOAD MY BEAT</button></div>
    </div>

    <div class="rack" id="main-rack"></div>

<script>
    let audioCtx, masterGain, isPlaying = false;
    let nextStepTime = 0, currentStep = 0, tempo = 85;

    const soundLibrary = {
        kick: ["Classic", "Hard 808", "Deep Sub", "Vintage"],
        snare: ["Lo-fi", "Rimshot", "Clap-ish", "Soft"],
        hihat: ["Closed", "Open", "Pedal", "Lo-bit"],
        rhodes: ["Neo-Soul", "E-Piano", "Dark Pad", "Vibes"],
        bass: ["Sub Sine", "Thick Tri", "808 Bass"],
        fx: ["Natural", "Crush", "Radio"],
        wechat: ["Message", "Ringtone"]
    };

    const tracks = [
        { id: 'kick', name: 'KICK', type: 'kick', group: 'DRUMS', vol: 0.8 },
        { id: 'snare', name: 'SNARE', type: 'snare', group: 'DRUMS', vol: 0.6 },
        { id: 'hihat', name: 'HI-HAT', type: 'hihat', group: 'DRUMS', vol: 0.4 },
        { id: 'rhodes1', name: 'KEYS A', type: 'rhodes', group: 'KEYS', vol: 0.5 },
        { id: 'rhodes2', name: 'KEYS B', type: 'rhodes', group: 'KEYS', vol: 0.5 },
        { id: 'bass', name: 'BASS', type: 'bass', group: 'BASS', vol: 0.7 },
        { id: 'rain', name: 'RAIN', type: 'fx', group: 'FX', vol: 0.2 },
        { id: 'wechat', name: 'WECHAT', type: 'wechat', group: 'FX', vol: 0.5 }
    ];

    const patterns = {};
    const rack = document.getElementById('main-rack');
    let currentGroup = '';

    tracks.forEach(t => {
        patterns[t.id] = Array(16).fill(0);
        if (t.group !== currentGroup) {
            const tag = document.createElement('div'); tag.className = 'group-tag'; tag.innerText = t.group;
            rack.appendChild(tag); currentGroup = t.group;
        }
        const trkDiv = document.createElement('div'); trkDiv.className = 'track';
        trkDiv.innerHTML = `
            <div class="mixer">
                <div class="track-name">${t.name}</div>
                <select id="style-${t.id}" style="background:#000; color:var(--border); border:1px solid #333; font-family:inherit; font-size:6px; margin:4px 0;">
                    ${soundLibrary[t.type] ? soundLibrary[t.type].map(s => `<option value="${s}">${s}</option>`).join('') : ''}
                </select>
                <input type="range" class="vol-slider" id="vol-${t.id}" min="0" max="1" step="0.05" value="${t.vol}">
            </div>
            <div class="steps" id="steps-${t.id}"></div>
        `;
        rack.appendChild(trkDiv);
        const stepsCont = document.getElementById(`steps-${t.id}`);
        for (let i = 0; i < 16; i++) {
            const s = document.createElement('div'); s.className = `step ${i % 4 === 0 ? 'beat' : ''}`;
            s.id = `step-${t.id}-${i}`;
            s.onclick = () => { patterns[t.id][i] = patterns[t.id][i] ? 0 : 1; s.classList.toggle('on'); };
            stepsCont.appendChild(s);
        }
    });

    function setStep(id, i) { 
        if (!patterns[id]) return; 
        patterns[id][i] = 1; 
        const el = document.getElementById(`step-${id}-${i}`);
        if (el) el.classList.add('on'); 
    }

    function applyFullLofiTemplate() {
        Object.keys(patterns).forEach(key => patterns[key].fill(0));
        document.querySelectorAll('.step').forEach(el => el.classList.remove('on'));
        const preset = {
            'kick': [0, 10], 'snare': [4, 12], 'hihat': [0, 2, 4, 6, 8, 10, 12],
            'rhodes1': [0], 'rhodes2': [6], 'bass': [0, 10], 'wechat': [14]
        };
        for (const [id, steps] of Object.entries(preset)) { steps.forEach(stepIdx => setStep(id, stepIdx)); }
        for(let i=0; i<16; i++) { setStep('rain', i); }
    }

    function playSound(id, time) {
        if (!audioCtx) return;
        const style = document.getElementById(`style-${id}`).value;
        const type = tracks.find(t => t.id === id).type;
        const vol = document.getElementById(`vol-${id}`).value;
        const g = audioCtx.createGain();

        if (type === 'wechat' && style === "Ringtone") {
            const notes = [659.25, 783.99, 659.25, 523.25];
            notes.forEach((f, i) => {
                const o = audioCtx.createOscillator(); const lg = audioCtx.createGain();
                o.type = 'sine'; o.frequency.setValueAtTime(f, time + i * 0.15);
                lg.gain.setValueAtTime(vol * 0.3, time + i * 0.15);
                lg.gain.exponentialRampToValueAtTime(0.001, time + i * 0.15 + 0.1);
                o.connect(lg).connect(masterGain); o.start(time + i * 0.15); o.stop(time + i * 0.15 + 0.12);
            });
            return;
        }

        const osc = audioCtx.createOscillator();
        if (type === 'kick') {
            osc.frequency.setValueAtTime(style === "Hard 808" ? 150 : 120, time);
            osc.frequency.exponentialRampToValueAtTime(0.01, time + (style === "Hard 808" ? 0.4 : 0.1));
            g.gain.setValueAtTime(vol, time); g.gain.exponentialRampToValueAtTime(0.001, time + (style === "Hard 808" ? 0.8 : 0.2));
        } else if (type === 'snare') {
            osc.type = (style === "Rimshot") ? 'triangle' : 'square';
            osc.frequency.setValueAtTime(220, time);
            g.gain.setValueAtTime(vol * 0.3, time); g.gain.exponentialRampToValueAtTime(0.01, time + 0.2);
        } else if (type === 'bass') {
            osc.type = 'triangle'; osc.frequency.setValueAtTime(style === "808 Bass" ? 50 : 60, time);
            g.gain.setValueAtTime(vol * 0.8, time); g.gain.exponentialRampToValueAtTime(0.001, time + 0.8);
        } else if (type === 'rhodes') {
            osc.type = 'sine';
            const freqs = { "Neo-Soul": 349.23, "E-Piano": 261.63, "Dark Pad": 174.61, "Vibes": 440.00 };
            osc.frequency.value = freqs[style] || 261.63;
            g.gain.setValueAtTime(vol * 0.3, time); g.gain.exponentialRampToValueAtTime(0.001, time + 1.2);
        } else if (type === 'wechat') {
            osc.type = 'sine'; osc.frequency.setValueAtTime(880, time);
            osc.frequency.exponentialRampToValueAtTime(1320, time + 0.1);
            g.gain.setValueAtTime(vol * 0.5, time); g.gain.exponentialRampToValueAtTime(0.001, time + 0.2);
        } else {
            osc.type = 'triangle'; osc.frequency.setValueAtTime(type === 'hihat' ? 10000 : 40, time);
            g.gain.setValueAtTime(vol * 0.2, time); g.gain.exponentialRampToValueAtTime(0.001, time + 0.3);
        }

        osc.connect(g).connect(masterGain); osc.start(time); osc.stop(time + 1.5);
    }

    function scheduler() {
        const stepDuration = 60 / tempo / 4;
        while (nextStepTime < audioCtx.currentTime + 0.1) {
            if (isPlaying) tracks.forEach(t => { if (patterns[t.id][currentStep]) playSound(t.id, nextStepTime); });
            draw(currentStep);
            nextStepTime += stepDuration; currentStep = (currentStep + 1) % 16;
        }
        if (isPlaying) setTimeout(scheduler, 25);
    }

    function draw(step) {
        document.querySelectorAll('.step').forEach(el => el.classList.remove('current'));
        tracks.forEach(t => { const el = document.getElementById(`step-${t.id}-${step}`); if (el) el.classList.add('current'); });
    }

    document.getElementById('play-btn').onclick = () => {
        if (!audioCtx) { audioCtx = new AudioContext(); masterGain = audioCtx.createGain(); masterGain.connect(audioCtx.destination); applyFullLofiTemplate(); }
        isPlaying = !isPlaying;
        document.getElementById('play-btn').innerText = isPlaying ? "PAUSE" : "RESUME";
        if (isPlaying) { nextStepTime = audioCtx.currentTime; scheduler(); }
    };
    document.getElementById('replay-btn').onclick = () => { currentStep = 0; if(audioCtx) nextStepTime = audioCtx.currentTime; };
	document.getElementById('clean-btn').onclick = () => {
    // 1. 将所有逻辑数据清零
    Object.keys(patterns).forEach(id => {
        if (patterns[id]) patterns[id].fill(0);
    });
    // 2. 移除所有格子的激活状态 (去掉橘色高亮)
    document.querySelectorAll('.step').forEach(el => el.classList.remove('on'));
};
    document.getElementById('bpm-slider').oninput = (e) => { tempo = e.target.value; document.getElementById('bpm-val').innerText = `BPM: ${tempo}`; };
    document.getElementById('master-vol').oninput = (e) => { if (masterGain) masterGain.gain.value = e.target.value; };
// --- 保存当前搭配 ---
document.getElementById('save-btn').onclick = () => {
    // 将当前的格子数据存入浏览器本地存储
    localStorage.setItem('lofi_user_preset', JSON.stringify(patterns));
    alert('搭配已保存！(Beat Saved to Browser)');
};

// --- 加载保存的搭配 ---
document.getElementById('load-btn').onclick = () => {
    const saved = localStorage.getItem('lofi_user_preset');
    if (!saved) {
        alert('还没有保存过搭配哦！');
        return;
    }

    // 1. 先清空当前界面
    Object.keys(patterns).forEach(id => { if (patterns[id]) patterns[id].fill(0); });
    document.querySelectorAll('.step').forEach(el => el.classList.remove('on'));

    // 2. 解析并还原数据
    const savedPatterns = JSON.parse(saved);
    for (const [id, steps] of Object.entries(savedPatterns)) {
        if (patterns[id]) {
            steps.forEach((val, index) => {
                if (val === 1) setStep(id, index);
            });
        }
    }
    alert('已加载你保存的搭配！');
};
</script>
</body>
</html>
