<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <title>Lofi Code Player</title>
    <style>
        body {
            margin: 0;
            height: 100vh;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            background: #0f172a;
            color: #38bdf8;
            font-family: monospace;
        }
        .status { margin-bottom: 20px; font-size: 1.2rem; }
        button {
            padding: 15px 30px;
            background: transparent;
            border: 2px solid #38bdf8;
            color: #38bdf8;
            cursor: pointer;
            font-size: 1rem;
            transition: 0.3s;
        }
        button:hover { background: #38bdf8; color: #0f172a; }
    </style>
</head>
<body>

    <div class="status" id="display">READY TO RELAX</div>
    <button id="playBtn">START LOFI BEATS</button>

<script>
    const playBtn = document.getElementById('playBtn');
    const display = document.getElementById('display');

    playBtn.addEventListener('click', () => {
        const audioCtx = new (window.AudioContext || window.webkitAudioContext)();
        display.innerText = "PLAYING LOFI BEATS...";
        playBtn.style.display = "none";

        // 1. 生成黑胶底噪
        const createNoise = () => {
            const bufferSize = audioCtx.sampleRate * 2;
            const buffer = audioCtx.createBuffer(1, bufferSize, audioCtx.sampleRate);
            const output = buffer.getChannelData(0);
            for (let i = 0; i < bufferSize; i++) {
                output[i] = Math.random() * 2 - 1;
            }
            const whiteNoise = audioCtx.createBufferSource();
            whiteNoise.buffer = buffer;
            whiteNoise.loop = true;
            const filter = audioCtx.createBiquadFilter();
            filter.type = 'bandpass';
            filter.frequency.value = 500;
            const gain = audioCtx.createGain();
            gain.gain.value = 0.015; 
            whiteNoise.connect(filter).connect(gain).connect(audioCtx.destination);
            whiteNoise.start();
        };

        // 2. 模拟电钢琴
        const playNote = (freq, start, duration) => {
            const osc = audioCtx.createOscillator();
            const gain = audioCtx.createGain();
            const lpf = audioCtx.createBiquadFilter();
            osc.type = 'triangle';
            osc.frequency.value = freq;
            lpf.type = 'lowpass';
            lpf.frequency.value = 800;
            gain.gain.setValueAtTime(0, start);
            gain.gain.linearRampToValueAtTime(0.1, start + 0.1);
            gain.gain.exponentialRampToValueAtTime(0.001, start + duration);
            osc.connect(lpf).connect(gain).connect(audioCtx.destination);
            osc.start(start);
            osc.stop(start + duration);
        };

        // 3. 循环逻辑
        const playLoop = () => {
            const chords = [
                [293.66, 349.23, 440.00, 523.25], // Dm7
                [392.00, 493.88, 587.33, 698.46], // G7
                [261.63, 329.63, 392.00, 493.88], // Cmaj7
                [440.00, 523.25, 659.25, 783.99]  // Am7
            ];
            let time = audioCtx.currentTime + 0.1;
            const tempo = 75; 
            const beatDuration = 60 / tempo;

            const sequence = () => {
                chords.forEach((chord, i) => {
                    chord.forEach(freq => {
                        playNote(freq, time + (i * beatDuration * 4), beatDuration * 3.5);
                    });
                });
                time += beatDuration * 16;
                setTimeout(sequence, (beatDuration * 16) * 1000);
            };
            sequence();
        };

        createNoise();
        playLoop();
    });
</script>
</body>
</html>
